<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111e15">
  <title>Golfdrill</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golfdrill">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login gate ---------------------------------------------------------- -->
  <section id="login-view" class="login" hidden>
    <div class="login-box">
      <div class="brand brand--login">
        <span class="logo-icon">G</span>
        <span class="brand-name">Golfdrill</span>
      </div>
      <p class="muted">Sign in to your practice planner.</p>
      <form id="login-form">
        <label class="filter-label" for="login-email">Email</label>
        <input type="email" id="login-email" autocomplete="username" required>
        <label class="filter-label" for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
        <button type="submit" class="btn btn--primary" id="login-submit">Sign in</button>
        <p class="error" id="login-error" role="alert"></p>
      </form>
    </div>
  </section>

  <!-- App ----------------------------------------------------------------- -->
  <section id="app-view" hidden>
    <header class="appbar">
      <div class="brand">
        <span class="logo-icon">G</span>
        <span class="brand-name">Golfdrill</span>
      </div>
      <button type="button" class="signout-btn" id="sign-out" aria-label="Sign out" title="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </header>

    <main>
      <div id="tab-today" class="tabpane"></div>

      <div id="tab-plans" class="tabpane" hidden></div>

      <div id="tab-library" class="tabpane" hidden>
        <h1 class="greeting">Library.</h1>
        <p class="subtitle">Browse individual drills by focus</p>
        <div id="library-filters"></div>
        <div id="library-list"></div>
      </div>

      <div id="tab-history" class="tabpane" hidden></div>

      <div id="tab-stats" class="tabpane" hidden></div>
    </main>

    <nav class="bottom-nav">
      <button type="button" class="nav-item" data-tab="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>Today</span>
      </button>
      <button type="button" class="nav-item" data-tab="plans">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        <span>Plans</span>
      </button>
      <button type="button" class="nav-item" data-tab="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        <span>Library</span>
      </button>
      <button type="button" class="nav-item" data-tab="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><polyline points="12 7 12 12 15 14"></polyline></svg>
        <span>History</span>
      </button>
      <button type="button" class="nav-item" data-tab="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        <span>Stats</span>
      </button>
    </nav>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register the service worker for offline / installable PWA support.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {
          /* offline support unavailable — app still works online */
        });
      });
    }
  </script>
</body>
</html>
